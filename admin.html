<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin A&A Hogar</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.container{background:#fff;padding:20px;border-radius:10px;max-width:900px;margin:auto}
input{width:100%;padding:10px;margin:5px 0}
button{padding:10px;border:none;border-radius:5px;cursor:pointer}
.save{background:#1e3a5f;color:#fff;width:100%}
img{width:80px}
</style>
</head>

<body>

<div class="container">

<h2>Administrador (con imágenes)</h2>

<input id="nombre" placeholder="Nombre">
<input id="precio" type="number" placeholder="Precio">
<input id="stock" type="number" placeholder="Stock">
<input id="categoria" placeholder="Categoría">

<input type="file" id="file1">
<input type="file" id="file2">
<input type="file" id="file3">
<input type="file" id="file4">

<button class="save" onclick="guardar()">Guardar Producto</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyAxPHkKdqMWNY32QZMDdR8ca1d1chJnW2Q",
authDomain: "aa-hogar.firebaseapp.com",
projectId: "aa-hogar",
storageBucket: "aa-hogar.appspot.com",
messagingSenderId: "1083066023138",
appId: "1:1083066023138:web:b02bf8045d801975fe72bb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

async function subir(file){
if(!file) return null;

const storageRef = ref(storage, "productos/" + Date.now() + file.name);
await uploadBytes(storageRef, file);
return await getDownloadURL(storageRef);
}

window.guardar = async function(){

const files = [
document.getElementById("file1").files[0],
document.getElementById("file2").files[0],
document.getElementById("file3").files[0],
document.getElementById("file4").files[0]
];

const urls = [];

for(const f of files){
const url = await subir(f);
if(url) urls.push(url);
}

await addDoc(collection(db,"productos"),{
nombre: nombre.value,
precio: Number(precio.value),
stock: Number(stock.value),
categoria: categoria.value,
imagenes: urls
});

alert("Producto guardado con imágenes");
location.reload();
}

</script>

</body>
</html>
