<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin A&A Hogar</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.container{background:#fff;padding:20px;border-radius:10px;max-width:900px;margin:auto}

input{width:100%;padding:10px;margin:5px 0}

button{padding:10px;border:none;border-radius:5px;cursor:pointer}

.save{background:#1e3a5f;color:#fff;width:100%}
.del{background:red;color:#fff}

table{width:100%;margin-top:20px}
img{width:60px}
</style>
</head>

<body>

<div class="container">

<h2>Administrador</h2>

<input id="nombre" placeholder="Nombre">
<input id="precio" type="number" placeholder="Precio">
<input id="stock" type="number" placeholder="Stock">
<input id="categoria" placeholder="Categoria">

<input id="img1" placeholder="Imagen 1">
<input id="img2" placeholder="Imagen 2">
<input id="img3" placeholder="Imagen 3">
<input id="img4" placeholder="Imagen 4">

<button class="save" onclick="guardar()">Guardar</button>

<table>
<tbody id="tabla"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxPHkKdqMWNY32QZMDdR8ca1d1chJnW2Q",
authDomain: "aa-hogar.firebaseapp.com",
projectId: "aa-hogar",
storageBucket: "aa-hogar.firebasestorage.app",
messagingSenderId: "1083066023138",
appId: "1:1083066023138:web:b02bf8045d801975fe72bb"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.guardar=async()=>{

await addDoc(collection(db,"productos"),{
nombre:document.getElementById("nombre").value,
precio:Number(document.getElementById("precio").value),
stock:Number(document.getElementById("stock").value),
categoria:document.getElementById("categoria").value,
imagenes:[
img1.value,img2.value,img3.value,img4.value
].filter(x=>x)
});

location.reload();
}

async function cargar(){

let snap=await getDocs(collection(db,"productos"));

let t=document.getElementById("tabla");
t.innerHTML="";

snap.forEach(d=>{
let p=d.data();

t.innerHTML+=`
<tr>
<td><img src="${p.imagenes?.[0]||''}"></td>
<td>${p.nombre}</td>
<td>${p.precio}</td>
<td><button class="del" onclick="del('${d.id}')">X</button></td>
</tr>
`;
});
}

window.del=async(id)=>{
await deleteDoc(doc(db,"productos",id));
location.reload();
}

cargar();

</script>

</body>
</html>
