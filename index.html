<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&A Hogar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#1e3a5f;
color:white;
text-align:center;
padding:20px;
}

.topbar{
display:flex;
gap:10px;
padding:15px;
background:white;
flex-wrap:wrap;
}

#buscar{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

#categoria{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

.cart{
font-weight:bold;
padding:10px;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.price{
color:green;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.btn{
width:100%;
padding:10px;
border:none;
background:#1e3a5f;
color:white;
cursor:pointer;
border-radius:5px;
}

.btn:hover{
opacity:.9;
}

#carrito{
position:fixed;
right:10px;
bottom:10px;
background:white;
padding:15px;
width:280px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.whatsapp{
background:#25D366;
color:white;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<header>
<h1>🏠 A&A Hogar</h1>
<p>Catálogo de Productos</p>
</header>

<div class="topbar">

<input
type="text"
id="buscar"
placeholder="Buscar producto...">

<select id="categoria">
<option value="">Todas las categorías</option>
</select>

<div class="cart">
🛒 <span id="contador">0</span>
</div>

</div>

<div class="container" id="productos"></div>

<div id="carrito">

<h3>Carrito</h3>

<div id="listaCarrito"></div>

<button
class="whatsapp"
onclick="finalizarCompra()">
Comprar por WhatsApp
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAxPHkKdqMWNY32QZMDdR8ca1d1chJnW2Q",

authDomain: "aa-hogar.firebaseapp.com",

projectId: "aa-hogar",

storageBucket: "aa-hogar.firebasestorage.app",

messagingSenderId: "1083066023138",

appId: "1:1083066023138:web:b02bf8045d801975fe72bb"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let productos = [];

let carrito = [];

async function cargarProductos(){

const querySnapshot =
await getDocs(collection(db,"productos"));

productos=[];

let categorias = new Set();

querySnapshot.forEach((doc)=>{

let p = doc.data();

productos.push(p);

if(p.categoria){

categorias.add(p.categoria);

}

});

llenarCategorias(categorias);

renderProductos();

}

function llenarCategorias(categorias){

const select =
document.getElementById("categoria");

categorias.forEach(cat=>{

let option =
document.createElement("option");

option.value = cat;

option.textContent = cat;

select.appendChild(option);

});

}

function renderProductos(){

const cont =
document.getElementById("productos");

const texto =
document.getElementById("buscar")
.value
.toLowerCase();

const categoria =
document.getElementById("categoria")
.value;

cont.innerHTML="";

productos.forEach((p,index)=>{

if(

(!texto ||
p.nombre.toLowerCase().includes(texto))

&&

(!categoria ||
p.categoria===categoria)

){

cont.innerHTML += `

<div class="card">

<img src="${p.imagen}">

<div class="info">

<h3>${p.nombre}</h3>

<p>${p.categoria}</p>

<div class="price">
$${p.precio}
</div>

<p>
Disponibles: ${p.stock}
</p>

<button
class="btn"
onclick="agregarCarrito(${index})">
Agregar al carrito
</button>

</div>

</div>

`;

}

});

}

window.agregarCarrito = function(index){

carrito.push(productos[index]);

actualizarCarrito();

}

function actualizarCarrito(){

document.getElementById("contador")
.innerText = carrito.length;

let html="";

carrito.forEach(p=>{

html += `
<div>
${p.nombre}
- $${p.precio}
</div>
`;

});

document.getElementById("listaCarrito")
.innerHTML = html;

}

window.finalizarCompra = function(){

if(carrito.length===0){

alert("El carrito está vacío");

return;

}

let mensaje =
"Hola, me interesa comprar:%0A%0A";

let total = 0;

carrito.forEach(p=>{

mensaje +=
`${p.nombre} - $${p.precio}%0A`;

total += Number(p.precio);

});

mensaje += `%0ATotal: $${total}`;

window.open(
`https://wa.me/5216563759945?text=${mensaje}`
);

}

document
.getElementById("buscar")
.addEventListener(
"keyup",
renderProductos
);

document
.getElementById("categoria")
.addEventListener(
"change",
renderProductos
);

cargarProductos();

</script>

</body>
</html>
