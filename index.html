<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&A Hogar</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#1e3a5f;
color:white;
text-align:center;
padding:20px;
}

.topbar{
display:flex;
gap:10px;
padding:15px;
background:white;
flex-wrap:wrap;
}

#buscar,#categoria{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.price{
color:green;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.btn{
width:100%;
padding:10px;
border:none;
background:#1e3a5f;
color:white;
cursor:pointer;
border-radius:5px;
}

.btn:hover{opacity:.9}

/* CARRITO */
#carrito{
position:fixed;
right:10px;
bottom:10px;
width:300px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:14px;
}

.remove{
color:red;
cursor:pointer;
}

.total{
margin-top:10px;
font-weight:bold;
}

.whatsapp{
background:#25D366;
color:white;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}
</style>
</head>

<body>

<header>
<h1>🏠 A&A Hogar</h1>
<p>Tienda tipo Amazon + WhatsApp</p>
</header>

<div class="topbar">
<input id="buscar" placeholder="Buscar producto...">
<select id="categoria">
<option value="">Todas</option>
</select>
</div>

<div class="container" id="productos"></div>

<!-- 🛒 CARRITO -->
<div id="carrito">
<h3>🛒 Carrito</h3>
<div id="lista"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button class="whatsapp" onclick="comprarTodo()">
Comprar todo por WhatsApp
</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxPHkKdqMWNY32QZMDdR8ca1d1chJnW2Q",
authDomain: "aa-hogar.firebaseapp.com",
projectId: "aa-hogar",
storageBucket: "aa-hogar.firebasestorage.app",
messagingSenderId: "1083066023138",
appId: "1:1083066023138:web:b02bf8045d801975fe72bb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let productos = [];
let carrito = [];

async function cargar(){

const snap = await getDocs(collection(db,"productos"));

productos = [];
let cats = new Set();

snap.forEach(d=>{
let p = d.data();
productos.push(p);
if(p.categoria) cats.add(p.categoria);
});

let sel = document.getElementById("categoria");
cats.forEach(c=>{
let op = document.createElement("option");
op.value = c;
op.textContent = c;
sel.appendChild(op);
});

render();
}

function render(){

let cont = document.getElementById("productos");
let t = document.getElementById("buscar").value.toLowerCase();
let c = document.getElementById("categoria").value;

cont.innerHTML = "";

productos.forEach((p,i)=>{

if((!t || p.nombre.toLowerCase().includes(t)) && (!c || p.categoria === c)){

cont.innerHTML += `
<div class="card">
<img src="${p.imagenes?.[0] || p.imagen || ''}">
<div class="info">
<h3>${p.nombre}</h3>
<p>${p.categoria}</p>
<div class="price">$${p.precio}</div>

<button class="btn" onclick="agregar(${i})">
Agregar al carrito
</button>

</div>
</div>
`;
}

});
}

/* 🛒 AGREGAR */
window.agregar = function(i){
carrito.push(productos[i]);
actualizarCarrito();
}

/* 🧾 ACTUALIZAR CARRITO */
function actualizarCarrito(){

let lista = document.getElementById("lista");
lista.innerHTML = "";

let total = 0;

carrito.forEach((p,ix)=>{
total += Number(p.precio);

lista.innerHTML += `
<div class="item">
<span>${p.nombre} - $${p.precio}</span>
<span class="remove" onclick="eliminar(${ix})">❌</span>
</div>
`;
});

document.getElementById("total").innerText = total;
}

/* ❌ ELIMINAR */
window.eliminar = function(ix){
carrito.splice(ix,1);
actualizarCarrito();
}

/* 🟢 WHATSAPP FINAL */
window.comprarTodo = function(){

if(carrito.length === 0){
alert("Carrito vacío");
return;
}

let msg = "🛒 Pedido A&A Hogar:%0A%0A";
let total = 0;

carrito.forEach(p=>{
msg += `• ${p.nombre} - $${p.precio}%0A`;
total += Number(p.precio);
});

msg += `%0A💰 Total: $${total}`;

window.open(
`https://wa.me/5216563759945?text=${msg}`,
"_blank"
);

}

/* filtros */
document.getElementById("buscar").addEventListener("input",render);
document.getElementById("categoria").addEventListener("change",render);

cargar();

</script>

</body>
</html>
