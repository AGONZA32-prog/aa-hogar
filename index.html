<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&A Hogar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f4f4f4}

header{
background:#1e3a5f;
color:#fff;
text-align:center;
padding:20px;
}

.topbar{
display:flex;
gap:10px;
padding:15px;
background:#fff;
flex-wrap:wrap;
}

#buscar,#categoria{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

#buscar{flex:1}

.cart{font-weight:bold;padding:10px}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{padding:15px}
.price{color:green;font-size:20px;font-weight:bold;margin:10px 0}

.btn{
width:100%;
padding:10px;
border:none;
background:#1e3a5f;
color:#fff;
border-radius:5px;
cursor:pointer;
}

#carrito{
position:fixed;
right:10px;
bottom:10px;
background:#fff;
padding:15px;
width:280px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.whatsapp{
background:#25D366;
color:#fff;
border:none;
padding:10px;
width:100%;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

.thumbs{
display:flex;
gap:5px;
margin-top:8px;
}

.thumbs img{
width:40px;
height:40px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
border:2px solid transparent;
}

</style>
</head>

<body>

<header>
<h1>🏠 A&A Hogar</h1>
<p>Catálogo de Productos</p>
</header>

<div class="topbar">
<input id="buscar" placeholder="Buscar producto...">
<select id="categoria"><option value="">Todas</option></select>
<div class="cart">🛒 <span id="contador">0</span></div>
</div>

<div class="container" id="productos"></div>

<div id="carrito">
<h3>Carrito</h3>
<div id="listaCarrito"></div>
<button class="whatsapp" onclick="finalizarCompra()">Comprar por WhatsApp</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxPHkKdqMWNY32QZMDdR8ca1d1chJnW2Q",
authDomain: "aa-hogar.firebaseapp.com",
projectId: "aa-hogar",
storageBucket: "aa-hogar.firebasestorage.app",
messagingSenderId: "1083066023138",
appId: "1:1083066023138:web:b02bf8045d801975fe72bb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let productos=[];
let carrito=[];
let imgIndex={};

async function cargarProductos(){

const snap = await getDocs(collection(db,"productos"));

productos=[];
let cats=new Set();

snap.forEach(d=>{
let p=d.data();
productos.push(p);
if(p.categoria) cats.add(p.categoria);
});

let sel=document.getElementById("categoria");
cats.forEach(c=>{
let op=document.createElement("option");
op.value=c;
op.textContent=c;
sel.appendChild(op);
});

render();
}

function render(){

let cont=document.getElementById("productos");
let t=document.getElementById("buscar").value.toLowerCase();
let c=document.getElementById("categoria").value;

cont.innerHTML="";

productos.forEach((p,i)=>{

if((!t||p.nombre.toLowerCase().includes(t)) && (!c||p.categoria===c)){

let imgs=p.imagenes||[];

if(!imgIndex[i]) imgIndex[i]=0;

cont.innerHTML+=`
<div class="card">

<img id="img-${i}" src="${imgs[imgIndex[i]]||''}">

<div class="thumbs">
${imgs.map((img,ix)=>`
<img src="${img}" onclick="cambiarImg(${i},${ix})">
`).join("")}
</div>

<div class="info">
<h3>${p.nombre}</h3>
<p>${p.categoria}</p>
<div class="price">$${p.precio}</div>
<p>Stock: ${p.stock}</p>

<button class="btn" onclick="add(${i})">Agregar</button>
</div>

</div>
`;
}

});
}

window.cambiarImg=function(i,ix){
imgIndex[i]=ix;
document.getElementById("img-"+i).src=productos[i].imagenes[ix];
}

window.add=function(i){
carrito.push(productos[i]);
document.getElementById("contador").innerText=carrito.length;
}

window.finalizarCompra=function(){

let msg="Hola quiero comprar:%0A";
let total=0;

carrito.forEach(p=>{
msg+=`${p.nombre} - $${p.precio}%0A`;
total+=Number(p.precio);
});

msg+=`%0ATotal: $${total}`;

window.open(`https://wa.me/5216563759945?text=${msg}`);
}

document.getElementById("buscar").addEventListener("input",render);
document.getElementById("categoria").addEventListener("change",render);

cargarProductos();

</script>
</body>
</html>
