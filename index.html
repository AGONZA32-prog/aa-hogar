<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&A Hogar</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#1e3a5f;
color:white;
text-align:center;
padding:20px;
}

.topbar{
display:flex;
gap:10px;
padding:15px;
background:white;
flex-wrap:wrap;
}

#buscar,#categoria{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* IMAGEN COMPLETA */
.card img{
width:100%;
height:220px;
object-fit:contain;
background:white;
cursor:pointer;
transition:0.3s;
}

.card img:hover{
transform:scale(1.03);
}

/* INFO */
.info{
padding:15px;
}

.price{
color:green;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.btn{
width:100%;
padding:10px;
border:none;
background:#1e3a5f;
color:white;
cursor:pointer;
border-radius:5px;
}

/* CARRITO */
#carrito{
position:fixed;
right:10px;
bottom:10px;
width:300px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:14px;
}

.whatsapp{
background:#25D366;
color:white;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

/* MODAL GALERÍA */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
z-index:999;
align-items:center;
justify-content:center;
}

#modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.nav{
position:absolute;
font-size:40px;
background:none;
color:white;
border:none;
cursor:pointer;
user-select:none;
}

.left{
left:20px;
}

.right{
right:20px;
}

.close{
top:20px;
right:20px;
font-size:30px;
position:absolute;
}
</style>

</head>

<body>

<header>
<h1>🏠 A&A Hogar</h1>
<p>Tienda online nuevo & seminuevo</p>
</header>

<div class="topbar">
<input id="buscar" placeholder="Buscar producto...">

<select id="categoria">
<option value="">Todas</option>
</select>
</div>

<div class="container" id="productos"></div>

<!-- 🛒 CARRITO -->
<div id="carrito">
<h3>🛒 Carrito</h3>
<div id="listaCarrito"></div>

<button class="whatsapp" onclick="finalizarCompra()">
Comprar por WhatsApp
</button>
</div>

<!-- 🖼 MODAL GALERÍA -->
<div id="modal">
<button class="nav left" onclick="prevImg()">⬅</button>

<img id="modalImg">

<button class="nav right" onclick="nextImg()">➡</button>

<button class="nav close" onclick="cerrarModal()">✖</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxPHkKdqMWNY32QZMDdR8ca1d1chJnW2Q",
authDomain: "aa-hogar.firebaseapp.com",
projectId: "aa-hogar",
storageBucket: "aa-hogar.firebasestorage.app",
messagingSenderId: "1083066023138",
appId: "1:1083066023138:web:b02bf8045d801975fe72bb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let productos = [];
let carrito = [];

let modalImages = [];
let modalIndex = 0;

/* CARGAR */
async function cargar(){

const snap = await getDocs(collection(db,"productos"));

productos = [];
let cats = new Set();

snap.forEach(d=>{
let p = d.data();
productos.push(p);
if(p.categoria) cats.add(p.categoria);
});

let sel = document.getElementById("categoria");
cats.forEach(c=>{
let op = document.createElement("option");
op.value = c;
op.textContent = c;
sel.appendChild(op);
});

render();
}

/* RENDER */
function render(){

let cont = document.getElementById("productos");
let t = document.getElementById("buscar").value.toLowerCase();
let c = document.getElementById("categoria").value;

cont.innerHTML = "";

productos.forEach((p,i)=>{

if((!t || p.nombre.toLowerCase().includes(t)) && (!c || p.categoria === c)){

let imgs = (p.imagenes && p.imagenes.length)
? p.imagenes
: ["https://via.placeholder.com/300"];

cont.innerHTML += `
<div class="card">

<img src="${imgs[0]}"
onclick="openGallery(${i})">

<div class="info">
<h3>${p.nombre}</h3>
<p>${p.categoria}</p>

<div class="price">$${p.precio}</div>

<p>Stock: ${p.stock}</p>

<button class="btn" onclick="agregar(${i})">
Agregar al carrito
</button>

</div>
</div>
`;
}

});
}

/* 🖼 ABRIR GALERÍA */
window.openGallery = function(i){

modalImages = productos[i].imagenes || [];
modalIndex = 0;

if(modalImages.length === 0){
modalImages = ["https://via.placeholder.com/300"];
}

document.getElementById("modalImg").src = modalImages[0];
document.getElementById("modal").style.display = "flex";
}

/* ➡ SIGUIENTE */
window.nextImg = function(){
modalIndex = (modalIndex + 1) % modalImages.length;
document.getElementById("modalImg").src = modalImages[modalIndex];
}

/* ⬅ ANTERIOR */
window.prevImg = function(){
modalIndex = (modalIndex - 1 + modalImages.length) % modalImages.length;
document.getElementById("modalImg").src = modalImages[modalIndex];
}

/* ❌ CERRAR */
window.cerrarModal = function(){
document.getElementById("modal").style.display = "none";
}

window.agregar = function(i){

carrito.push(productos[i]);

console.log("Producto agregado:");
console.log(productos[i]);

console.log("Carrito actual:");
console.log(carrito);

actualizarCarrito();
}

function actualizarCarrito(){

let lista = document.getElementById("listaCarrito");
lista.innerHTML = "";

carrito.forEach(p=>{
lista.innerHTML += `
<div class="item">
<span>${p.nombre} - $${p.precio}</span>
</div>
`;
});

}

/* WHATSAPP */
window.finalizarCompra = function(){

if(carrito.length === 0){
alert("Carrito vacío");
return;
}

let mensaje = "🛒 Pedido A&A Hogar:\n\n";
let total = 0;

carrito.forEach((p,index)=>{

mensaje += `${index + 1}. ${p.nombre}\n`;
mensaje += `   Precio: $${p.precio}\n`;

if(p.categoria){
mensaje += `   Categoría: ${p.categoria}\n`;
}

mensaje += "\n";

total += Number(p.precio);

});

mensaje += `💰 Total: $${total}`;

console.log("Mensaje enviado:");
console.log(mensaje);

const url =
`https://wa.me/5216563759945?text=${encodeURIComponent(mensaje)}`;

window.open(url,"_blank");
}
/* FILTROS */
document.getElementById("buscar").addEventListener("input",render);
document.getElementById("categoria").addEventListener("change",render);

cargar();

</script>

</body>
</html>
